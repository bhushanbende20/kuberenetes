---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: eck-operator
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/eck-operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: elastic-operator
      namespace: elastic-system
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: elasticsearch-stage
  namespace: flux-system
spec:
  interval: 5m
  path: ./infrastructure/elasticsearch/overlays/stage
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: eck-operator
  healthChecks:
    - apiVersion: elasticsearch.k8s.elastic.co/v1
      kind: Elasticsearch
      name: es-cluster-stage
      namespace: elasticsearch-stage
  timeout: 10m

---
# This file is generated by flux bootstrap and should not be manually edited.
# It wires the cluster to this Git repository.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  secretRef:
    name: flux-system          # SSH deploy key created by flux bootstrap
  url: ssh://git@github.com/<YOUR_ORG>/<YOUR_REPO>   # ← replace
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/dev          # ← change per cluster (dev / stage / prod)
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

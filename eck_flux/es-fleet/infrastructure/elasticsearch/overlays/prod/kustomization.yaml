---
# Prod overlay — HA with dedicated master, data, and ingest node sets.
# Multiple clusters supported by adding more resources below.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - es-cluster-prod-search.yaml   # second cluster (search-specific)
  # - es-cluster-prod-logs.yaml   # third cluster for log aggregation
  # - es-cluster-prod-metrics.yaml

namespace: elasticsearch-prod

commonLabels:
  env: prod

patches:
  # Replace the single combined base node-set with dedicated roles
  - target:
      kind: Elasticsearch
      name: es-cluster
    patch: |-
      - op: replace
        path: /metadata/name
        value: es-cluster-prod
      - op: replace
        path: /spec/version
        value: "8.13.4"
      - op: replace
        path: /spec/nodeSets
        value:
          # ── Dedicated masters (quorum = 3) ────────────────────────────────
          - name: master
            count: 3
            config:
              node.roles: ["master"]
              xpack.security.enabled: true
              xpack.security.http.ssl.enabled: true
              xpack.security.transport.ssl.enabled: true
            podTemplate:
              spec:
                initContainers:
                  - name: sysctl
                    securityContext:
                      privileged: true
                      runAsUser: 0
                    command: ["sh", "-c", "sysctl -w vm.max_map_count=262144"]
                containers:
                  - name: elasticsearch
                    resources:
                      requests:
                        memory: 2Gi
                        cpu: 500m
                      limits:
                        memory: 4Gi
                        cpu: "2"
                    env:
                      - name: ES_JAVA_OPTS
                        value: "-Xms2g -Xmx2g"
            volumeClaimTemplates:
              - metadata:
                  name: elasticsearch-data
                spec:
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 10Gi
                  storageClassName: fast-ssd
          # ── Data nodes ───────────────────────────────────────────────────
          - name: data
            count: 3
            config:
              node.roles: ["data", "data_content", "data_hot"]
              xpack.security.enabled: true
              xpack.security.http.ssl.enabled: true
              xpack.security.transport.ssl.enabled: true
            podTemplate:
              spec:
                initContainers:
                  - name: sysctl
                    securityContext:
                      privileged: true
                      runAsUser: 0
                    command: ["sh", "-c", "sysctl -w vm.max_map_count=262144"]
                containers:
                  - name: elasticsearch
                    resources:
                      requests:
                        memory: 8Gi
                        cpu: "2"
                      limits:
                        memory: 16Gi
                        cpu: "4"
                    env:
                      - name: ES_JAVA_OPTS
                        value: "-Xms8g -Xmx8g"
            volumeClaimTemplates:
              - metadata:
                  name: elasticsearch-data
                spec:
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 500Gi
                  storageClassName: fast-ssd
          # ── Ingest / coordinating nodes ──────────────────────────────────
          - name: ingest
            count: 2
            config:
              node.roles: ["ingest", "remote_cluster_client"]
              xpack.security.enabled: true
              xpack.security.http.ssl.enabled: true
              xpack.security.transport.ssl.enabled: true
            podTemplate:
              spec:
                initContainers:
                  - name: sysctl
                    securityContext:
                      privileged: true
                      runAsUser: 0
                    command: ["sh", "-c", "sysctl -w vm.max_map_count=262144"]
                containers:
                  - name: elasticsearch
                    resources:
                      requests:
                        memory: 4Gi
                        cpu: "1"
                      limits:
                        memory: 8Gi
                        cpu: "2"
                    env:
                      - name: ES_JAVA_OPTS
                        value: "-Xms4g -Xmx4g"
            volumeClaimTemplates:
              - metadata:
                  name: elasticsearch-data
                spec:
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 10Gi
                  storageClassName: fast-ssd

---
# Dev overlay — multiple ES clusters in one namespace.
# Add more components: blocks below to spin up additional clusters.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

  # Each additional cluster is its own manifest file in this overlay dir.
  # Uncomment / add more to get multiple clusters in dev.
  - es-cluster-dev.yaml
  # - es-cluster-dev-2.yaml
  # - es-cluster-logs.yaml

namespace: elasticsearch-dev

commonLabels:
  env: dev

patches:
  # ── Patch the base cluster (renamed to es-cluster-dev) ──────────────────
  - target:
      kind: Elasticsearch
      name: es-cluster
    patch: |-
      - op: replace
        path: /metadata/name
        value: es-cluster-dev
      - op: replace
        path: /spec/version
        value: "8.13.4"
      - op: replace
        path: /spec/nodeSets/0/count
        value: 1
      - op: replace
        path: /spec/nodeSets/0/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 5Gi
      - op: replace
        path: /spec/nodeSets/0/podTemplate/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/nodeSets/0/podTemplate/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/nodeSets/0/podTemplate/spec/containers/0/env/0/value
        value: "-Xms256m -Xmx256m"

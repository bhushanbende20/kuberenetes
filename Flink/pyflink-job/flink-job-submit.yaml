apiVersion: batch/v1
kind: Job
metadata:
  name: pyflink-finance-job
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: job-submitter
        image: learningdocker2023/pyflink-finance-job:1.0  
        imagePullPolicy: Always
        command:
          - bash
          - -c
          - |
            ./bin/flink run \
              -m flink-jobmanager:8081 \
              -py /opt/flink/jobs/finance_csv_to_json.py
